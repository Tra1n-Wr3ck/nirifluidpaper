name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev meson ninja-build libgtk4-layer-shell-dev
    
    - name: Build
      run: |
        meson setup build
        ninja -C build
